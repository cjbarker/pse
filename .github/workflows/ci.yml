name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint, migrate & test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pse
          POSTGRES_PASSWORD: pse
          POSTGRES_DB: pse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pse"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://pse:pse@localhost:5432/pse
      SYNC_DATABASE_URL: postgresql+psycopg://pse:pse@localhost:5432/pse
      TEST_DATABASE_URL: postgresql+asyncpg://pse:pse@localhost:5432/pse

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Sync dependencies (Python ${{ matrix.python-version }})
        run: uv sync --frozen --python ${{ matrix.python-version }}

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Validate migrations (up → down → up)
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest -q

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: pse:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
